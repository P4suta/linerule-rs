[package]
name          = "linerule-core"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
readme.workspace       = true
keywords.workspace     = true
categories.workspace   = true
description = "Pure-logic core for linerule: Mode/Action state machine, render() pure function, type-safe newtypes"

[lib]
# Integration tests live in `tests/`; the lib target itself has no
# `#[test]` items and no doctests, so skip compiling those harnesses.
test    = false
doctest = false

[lints]
workspace = true

[dependencies]
smallvec  = { workspace = true }
thiserror = { workspace = true }
serde     = { workspace = true, optional = true }

[features]
default = []
serde   = ["dep:serde", "smallvec/serde"]

[dev-dependencies]
# bolero / insta / pretty_assertions are added back when the first
# property / snapshot / pretty-diff test lands (ADR-0008 test strategy).
