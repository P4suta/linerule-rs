# lefthook — git hooks runner.
#
# One-time install: `just hooks`. Every step delegates to a Justfile
# `_hook-*` recipe so tools route through the dev container the same way
# `just lint` does — no tool is assumed to exist on the host.
#
# Policy: every formatter runs with `stage_fixed: true` — the author writes
# code, lefthook fixes formatting on the way to the index, the commit
# captures the fixed form. CI re-runs the same tools in `--check` mode.

assert_lefthook_installed: true
no_tty: false
colors: true

pre-commit:
  parallel: false
  follow: true
  commands:
    # ---- auto-fixers (stage_fixed = true) ----
    cargo-fmt:
      tags: format
      glob: "*.rs"
      run: just _hook-fmt {staged_files}
      stage_fixed: true

    cargo-sort:
      tags: format
      glob: "{**/Cargo.toml,Cargo.lock}"
      run: just _hook-cargo-sort
      stage_fixed: true

    taplo-fmt:
      tags: format
      glob: "*.toml"
      run: just _hook-taplo-fmt {staged_files}
      stage_fixed: true

    biome-format:
      tags: format
      glob: "{*.json,*.jsonc}"
      run: just _hook-biome-format {staged_files}
      stage_fixed: true

    yamlfmt:
      tags: format
      glob: "{*.yml,*.yaml}"
      run: just _hook-yamlfmt {staged_files}
      stage_fixed: true

    typos-fix:
      tags: spell
      run: just _hook-typos-fix {staged_files}
      stage_fixed: true

    # ---- checks (no auto-fix; author must address) ----
    actionlint:
      tags: ci
      glob: "{.github/workflows/*.yml,.github/workflows/*.yaml}"
      run: just _hook-actionlint {staged_files}

    xtask-dep-graph:
      tags: lint
      glob: "{**/Cargo.toml,Cargo.lock}"
      run: just _hook-xtask-dep-graph

    # Rust ファイルが staged されているコミットでは clippy + rustdoc-check
    # + cross-check を走らせる。workspace の incremental compile が効くため
    # 通常は数秒で完了する。CI と同じゲートをローカル commit 時にも適用し、
    # push 前ではなく commit 前に気づける範囲を広げる ([[linerule-rs-trust-lefthook]])。
    clippy:
      tags: lint
      glob: "*.rs"
      run: just clippy

    rustdoc-check:
      tags: docs
      glob: "*.rs"
      run: just rustdoc-check

    cross-check:
      tags: build
      glob: "*.rs"
      run: just cross-check

commit-msg:
  commands:
    commitlint:
      run: just _hook-commitlint {1}

pre-push:
  # CI のゲートと検出範囲を揃える: PR を出してから CI で初めて怒られるのを防ぐ。
  # 対応関係:
  #   - lint          ↔ `clippy` + `fmt` + `cargo-deny` + `typos` + `actionlint` + `cargo-machete` + `dep-graph`
  #   - test          ↔ `build + test (linux)` の `cargo nextest run` と `cargo test --doc`
  #   - cross-check   ↔ `cross-check (linux → win-x64)` (`--all-targets` で examples/tests も含む)
  #   - rustdoc-check ↔ `.github/workflows/docs.yml` (`RUSTDOCFLAGS=-D warnings` の rustdoc build)
  piped: true
  commands:
    lint:
      tags: lint
      run: just lint
    test:
      tags: test
      run: just test
    cross-check:
      tags: build
      run: just cross-check
    rustdoc-check:
      tags: docs
      run: just rustdoc-check
