name: linerule-rs

services:
  dev:
    # CI publishes the prebuilt dev image to ghcr.io (see
    # .github/workflows/dev-image.yml). `docker compose pull` retrieves it
    # in ~20 s; `docker compose build` falls back to local build for
    # Dockerfile iteration.
    image: ghcr.io/p4suta/linerule-rs-dev:latest
    build:
      context: .
      args:
        USER_UID: "${UID:-1000}"
        USER_GID: "${GID:-1000}"
      secrets:
        - github-token
    working_dir: /workspace
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      INSIDE_CONTAINER: "1"
      CARGO_TARGET_DIR: /workspace/target
      LINERULE_LOG: "${LINERULE_LOG:-debug,wnd_proc=info,heartbeat=info,cursor_tracker=info}"
      # cargo-xwin の clang backend (single-tarball sysroot) を強制し、
      # 旧 clang-cl backend の遅い MSVC CRT 分割 DL を回避。Dockerfile で
      # 焼き込んだ sysroot もこちらの path にある。
      XWIN_CROSS_COMPILER: clang
    volumes:
      - .:/workspace:cached
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      # No xwin-cache volume — the (~500 MB) MSVC CRT / Windows SDK sysroot
      # is baked into the dev image (see Dockerfile), so the first
      # `just cross-check` is instant. Volume-mounting here would shadow the
      # image content with an empty volume and re-trigger the download.
      - npm-cache:/workspace/node_modules
    init: true
    stdin_open: true
    tty: true

volumes:
  cargo-registry:
  cargo-git:
  npm-cache:

# GITHUB_TOKEN is mounted as a build secret (never baked into the image)
# so cargo-binstall can authenticate to api.github.com and skip the
# unauthenticated rate-limit cliff. Empty / missing token is tolerated —
# binstall falls back to source compile (slow but correct).
secrets:
  github-token:
    environment: GITHUB_TOKEN
