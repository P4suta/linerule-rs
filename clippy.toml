avoid-breaking-exported-api = false
cognitive-complexity-threshold = 15
too-many-arguments-threshold = 7
type-complexity-threshold = 250
too-many-lines-threshold = 100
trivial-copy-size-limit = 128
pass-by-value-size-limit = 256

# Tests legitimately use `unwrap`/`expect`/`panic`/`println`/`dbg` — gate them
# only outside the test boundary.
allow-unwrap-in-tests = true
allow-expect-in-tests = true
allow-panic-in-tests = true
allow-print-in-tests = true
allow-dbg-in-tests = true

# B.5: 旧 xtask strict-code の役割を clippy 設定 + cargo-deny に統合
disallowed-macros = [
    { path = "lazy_static::lazy_static", reason = "use std::sync::OnceLock or std::sync::LazyLock" },
]
disallowed-types = [
    { path = "once_cell::sync::Lazy", reason = "use std::sync::LazyLock (stable since 1.80)" },
    { path = "once_cell::sync::OnceCell", reason = "use std::sync::OnceLock (stable since 1.70)" },
]
disallowed-methods = [
    { path = "std::env::set_var", reason = "boundary 以外で環境変数を変更しない" },
    { path = "windows::Win32::Graphics::DirectComposition::IDCompositionSurface::BeginDraw", reason = "IDCompositionSurface::BeginDraw<T> の T は ID2D1DeviceContext 固定。win32_ffi::graphics::begin_dcomp_draw_d2d 経由で呼ぶこと (ID2D1Bitmap1 等を渡すと E_NOINTERFACE で毎 tick 描画落ちする事故防止、Phase I 実機検証)。" },
    { path = "windows::Win32::Graphics::DirectComposition::IDCompositionSurface::EndDraw", reason = "対称性のため win32_ffi::graphics::end_dcomp_draw 経由で呼ぶこと。" },
    { path = "windows::Win32::Graphics::Direct2D::ID2D1RenderTarget::BeginDraw", reason = "DComp surface 経由の context は drawing mode で返る (MS Docs)。D2D BeginDraw を重ねると D2DERR_WRONG_STATE → surface stuck → DCOMPOSITION_ERROR_SURFACE_BEING_RENDERED のカスケード障害 (Phase I 続編)。SetTransform/Clear/DrawText を直接発行し end_dcomp_draw で閉じる。`ID2D1DeviceContext` は Deref<Target=ID2D1RenderTarget> 経由でこのメソッドを継承するため、親 trait の path で deny する。" },
    { path = "windows::Win32::Graphics::Direct2D::ID2D1RenderTarget::EndDraw", reason = "同上。surface.EndDraw 経由で D2D session も内部的に閉じられる。" },
    { path = "windows::Win32::Graphics::DirectComposition::IDCompositionDesktopDevice::Commit", reason = "win32_ffi::graphics::commit() の wrapper 経由で呼ぶこと。直叩きは『commit の呼び出し場所が拡散して呼び忘れ事故が増える』ため deny (Phase I PR #60 で HudRenderer::apply が commit 呼び忘れて HUD non-visible だった事故予防)。" },
    { path = "windows::Win32::UI::WindowsAndMessaging::ShowWindow", reason = "win32_ffi::show_window_noactivate() の wrapper 経由で呼ぶこと。直叩きは focus 奪取の事故源 (Phase I PR #60 で意図的 skip → 実環境で visible にならない事故後の予防策)。" },
]
