# typos — strict spell check across the repo.
# Fix typos rather than suppress them; the allowlist below is the minimum
# needed to accommodate technical idioms and Win32 vocabulary.

[default]
locale = "en-us"

[default.extend-identifiers]
HWND_MESSAGE = "HWND_MESSAGE"
LPARAM = "LPARAM"
WPARAM = "WPARAM"
LRESULT = "LRESULT"
GWL = "GWL"
GWLP = "GWLP"
HWND = "HWND"
HMENU = "HMENU"
PCWSTR = "PCWSTR"
PCSTR = "PCSTR"
WPARAM_TYPE = "WPARAM_TYPE"

[default.extend-words]
cli = "cli"
Cli = "Cli"
Marshalling = "Marshalling"
jis = "jis"
sjis = "sjis"
Pris = "Pris"
SEH = "SEH"
DComp = "DComp"
LWA = "LWA"
DXGI = "DXGI"

[files]
extend-exclude = [
    "target/**",
    "artifacts/**",
    "**/*.lock",
    "**/*.snap",
    "**/*.snap.new",
    ".jj/**",
    "node_modules/**",
]

[type.toml]
extend-glob = ["*.toml"]

[type.rust]
extend-glob = ["*.rs"]
