[alias]
xtask = "run --quiet --package xtask --"

[build]
# Default target stays native; CI overrides for cross checks.

# Linux native: use clang + mold linker. mold is 2-5x faster at linking than
# the default ld. Set in Dockerfile and developer setup; binary is required.
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.x86_64-pc-windows-msvc]
# cargo-xwin が自動補完するため空。必要に応じて linker を上書き。

[term]
color = "auto"
