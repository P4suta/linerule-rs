coverage:
  status:
    project:
      default:
        target: 100%
        threshold: 0.5%
        if_not_found: success
    patch:
      default:
        target: 100%
        threshold: 0.5%
        if_not_found: success

ignore:
  - "target/**"
  - "**/main.rs"
  - "crates/linerule-platform/src/windows.rs"  # FFI boundary, see ADR-0006

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
