# Mutation testing for `linerule-core` via `cargo-mutants`.
#
# Why scope = linerule-core only:
#   - The reducer / parser / frame builder are the project's "logic
#     center"; missed mutants there mean a real test gap.
#   - linerule-platform-windows is `#![cfg(windows)]`; cargo-mutants would
#     need a Windows runner. Not worth the wall time for a thin FFI veneer.
#   - linerule-app is mostly clap + boot glue; mutating it produces lots
#     of low-signal "skipped" mutants.
#
# Why this *is* a gate (Phase ε, 2026-05-21):
#   - Baseline established at 0 missed / 271 caught / 45 unviable. Any new
#     missed mutant in a PR is a regression and must either be killed by
#     a focused test or be marked `// mutants: skip` with a justification.
#   - The run takes 5–15 min and only fires when `crates/linerule-core/**`
#     changes (path filter below), so the gate cost is bounded.
#   - See `docs/mutation-baseline.md` for the kill-ratio policy and the
#     rationale behind the 8 test additions that drove the baseline to 0.

name: mutants

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "crates/linerule-core/**"

permissions:
  contents: read

concurrency:
  group: mutants-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutate-core:
    name: cargo-mutants on linerule-core
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@213ccc1a076163c093f914550b94feb90fab916d # v2.79.2
        with:
          tool: cargo-mutants,cargo-nextest
      - name: cargo mutants (linerule-core only, gate enabled)
        # Exit non-zero on any missed mutant. Baseline is 0 missed
        # (see docs/mutation-baseline.md); any regression must be killed
        # by a focused test or annotated with `// mutants: skip` plus a
        # justification in the same PR.
        run: |
          cargo mutants \
            --package linerule-core \
            --baseline skip \
            --no-times \
            --output target/mutants \
            --test-tool nextest
      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutants-report
          path: target/mutants/
          if-no-files-found: warn
