name: build-image

# Build the dev container image and push to GHCR whenever the
# Dockerfile or workspace lockfile changes on main. CI runs pull
# this cached image instead of rebuilding from scratch (ADR-0008).

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'Cargo.lock'
      - 'compose.yaml'
      - 'rust-toolchain.toml'
  workflow_dispatch:

# Single in-flight build per branch.
concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write   # push to ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build + push dev image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          target: dev
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/linerule-dev:latest
            ghcr.io/${{ github.repository_owner }}/linerule-dev:cache
          cache-from: type=gha,scope=docker-dev
          cache-to: type=gha,scope=docker-dev,mode=max
