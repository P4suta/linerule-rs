name: build-image

# Build the dev container image and push to GHCR whenever the
# Dockerfile or workspace lockfile changes on main. CI runs pull
# this cached image instead of rebuilding from scratch (ADR-0008).

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'Cargo.lock'
      - 'compose.yaml'
      - 'rust-toolchain.toml'
  workflow_dispatch:

# Single in-flight build per branch.
concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write   # push to ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Login to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build + push dev image
        uses: docker/build-push-action@5176d81f87c23d6fc96624dfdbcd9f3830bbe445 # v6.5.0
        with:
          context: .
          target: dev
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/linerule-dev:latest
            ghcr.io/${{ github.repository_owner }}/linerule-dev:cache
          cache-from: type=gha,scope=docker-dev
          cache-to: type=gha,scope=docker-dev,mode=max
