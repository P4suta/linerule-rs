# linerule-rs CI.
#
# Policy:
#   - No `on: schedule`. Dependabot is the only scheduled job.
#   - Every action is SHA-pinned; Dependabot bumps weekly.
#   - Cross-platform jobs run on ubuntu-latest; Windows-native build /
#     test runs on windows-latest because the platform crate is `#![cfg(windows)]`.
#   - Coverage is reported, not gated at 100%.
#   - `Swatinem/rust-cache` is used in place of raw `actions/cache` for cargo
#     state — it knows the right keys for `target/`, registry, and indexes.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write # for coverage / dependency-review comments
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  build-test-linux:
    name: build + test (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@213ccc1a076163c093f914550b94feb90fab916d # v2.79.2
        with:
          tool: cargo-nextest
      - name: cargo build (exclude platform-windows)
        run: cargo build --workspace --exclude linerule-platform-windows --all-targets
      - name: cargo nextest (exclude platform-windows)
        run: cargo nextest run --workspace --exclude linerule-platform-windows
      # nextest does not run doctests; run them as a separate step.
      - name: cargo test --doc (exclude platform-windows)
        run: cargo test --doc --workspace --exclude linerule-platform-windows

  build-test-windows:
    name: build + test (windows)
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@213ccc1a076163c093f914550b94feb90fab916d # v2.79.2
        with:
          tool: cargo-nextest
      - run: cargo build --workspace --all-targets
      - run: cargo nextest run --workspace --run-ignored all
      # nextest does not run doctests; run them as a separate step.
      - run: cargo test --doc --workspace

  cross-check:
    name: cross-check (linux → win-x64)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # clang backend = single 283 MB tarball from
      # trcrsired/windows-msvc-sysroot (~25 s) vs clang-cl streaming
      # 500 MB of MSVC shards from microsoft.com (~7 min).
      XWIN_CROSS_COMPILER: clang
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@213ccc1a076163c093f914550b94feb90fab916d # v2.79.2
        with:
          tool: cargo-xwin
      # Cache the unpacked sysroot so the second run skips even the 25 s
      # tarball fetch. cargo-xwin v0.18+ stores it under
      # ~/.cache/cargo-xwin/windows-msvc-sysroot/. Bump the key when
      # upstream trcrsired/windows-msvc-sysroot publishes a major schema
      # change.
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/cargo-xwin
          key: cargo-xwin-clang-sysroot-${{ runner.os }}
      - run: rustup target add x86_64-pc-windows-msvc
      - run: cargo xwin check --workspace --target x86_64-pc-windows-msvc

  release-build:
    name: release build (win-x64, native)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo build --release -p linerule-app
      # P2-4: native smoke. The binary built above must actually start and
      # respond to subcommands — bare-minimum "did clap parsing survive?"
      # gate. Run hits stdout + exit code; we don't try to invoke `run` here
      # because it blocks on the message pump.
      - name: smoke - linerule.exe version
        shell: pwsh
        run: |
          $exe = "target/release/linerule.exe"
          & $exe version
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::linerule.exe version exited with $LASTEXITCODE"
            exit 1
          }
      - name: smoke - linerule.exe diagnostics --dry-run
        shell: pwsh
        run: |
          $exe = "target/release/linerule.exe"
          & $exe diagnostics --dry-run
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::linerule.exe diagnostics --dry-run exited with $LASTEXITCODE"
            exit 1
          }
      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linerule-win-x64
          path: target/release/linerule.exe
          if-no-files-found: error

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: taiki-e/install-action@213ccc1a076163c093f914550b94feb90fab916d # v2.79.2
        with:
          tool: cargo-sort,taplo-cli
      - run: cargo fmt --all -- --check
      - run: cargo sort --workspace --check
      - run: taplo fmt --check

  fmt-non-rust:
    name: fmt (json / yaml)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: install biome + yamlfmt
        run: |
          curl -fsSL "https://github.com/biomejs/biome/releases/latest/download/biome-linux-x64" \
            -o /usr/local/bin/biome
          sudo chmod +x /usr/local/bin/biome
          YAMLFMT_VERSION=0.13.0
          curl -fsSL "https://github.com/google/yamlfmt/releases/download/v${YAMLFMT_VERSION}/yamlfmt_${YAMLFMT_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar xz -C /usr/local/bin yamlfmt
      - run: biome format .
      - run: yamlfmt --lint .

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets --exclude linerule-platform-windows -- -D warnings

  dep-graph:
    name: dep-graph (xtask)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo xtask dep-graph

  spell-check:
    name: typos
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: crate-ci/typos@aca895bf05aec0cb7dffa6f94495e923224d9f17 # v1.46.2

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: actionlint
        env:
          ACTIONLINT_VERSION: 1.7.12
        run: |
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar xz -C /tmp actionlint
          /tmp/actionlint -color

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@213ccc1a076163c093f914550b94feb90fab916d # v2.79.2
        with:
          tool: cargo-deny
      # Workaround for upstream rustsec/advisory-db RUSTSEC-2026-0076.md which
      # wraps its TOML frontmatter in triple-backtick fences and cannot be
      # parsed by cargo-deny / cargo-audit. cargo-deny v0.18+ names the local
      # clone `advisory-db-3157b0e258782691` (stable hash, see PR#745). Drop
      # the malformed file there, then run with `--disable-fetch` so the
      # next pass doesn't `git pull` the broken file back.
      - name: Pre-fetch advisory-db (RUSTSEC-2026-0076 workaround)
        run: |
          set -eux
          DB="$HOME/.cargo/advisory-dbs/advisory-db-3157b0e258782691"
          mkdir -p "$(dirname "$DB")"
          git clone --depth 1 https://github.com/rustsec/advisory-db "$DB"
          rm -f "$DB/crates/libcrux-ml-dsa/RUSTSEC-2026-0076.md"
      - run: cargo deny check --disable-fetch advisories bans licenses sources

  cargo-machete:
    name: cargo-machete (unused deps)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: taiki-e/install-action@213ccc1a076163c093f914550b94feb90fab916d # v2.79.2
        with:
          tool: cargo-machete
      - run: cargo machete

  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: taiki-e/install-action@213ccc1a076163c093f914550b94feb90fab916d # v2.79.2
        with:
          tool: cargo-audit
      # Workaround for upstream rustsec/advisory-db RUSTSEC-2026-0076.md (see
      # cargo-deny job).
      - name: Pre-fetch advisory-db (RUSTSEC-2026-0076 workaround)
        run: |
          set -eux
          DB="$HOME/.cargo/advisory-db"
          git clone --depth 1 https://github.com/rustsec/advisory-db "$DB"
          rm -f "$DB/crates/libcrux-ml-dsa/RUSTSEC-2026-0076.md"
      - run: cargo audit --no-fetch --deny warnings

  coverage:
    # P2-3: required gate. Scope = linerule-core + linerule-app
    # (linerule-platform-windows is `#![cfg(windows)]` and excluded on the
    # Linux runner; see docs/adr/0004-coverage-policy.md).
    name: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@213ccc1a076163c093f914550b94feb90fab916d # v2.79.2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - run: rustup component add llvm-tools-preview
      - name: cargo llvm-cov (fail under 80% lines)
        run: |
          cargo llvm-cov nextest \
            --workspace \
            --exclude linerule-platform-windows \
            --exclude xtask \
            --lcov \
            --output-path lcov.info \
            --fail-under-lines 80
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: lcov.info

  dependency-review:
    name: dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: true
          # Don't render OpenSSF Scorecard annotations: most warnings come
          # from transitive deps we don't control (e.g. vswhom/vswhom-sys
          # pulled by embed-resource) and the noise drowns out real findings.
          show-openssf-scorecard: false

  conventional-commits:
    name: conventional commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
