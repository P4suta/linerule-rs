name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Successive pushes cancel earlier in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read   # pull dev image from ghcr.io

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  lint-test-coverage:
    name: lint + test + coverage (linux, docker)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # `just` is the single entry point for every recipe (ADR-0005). The
      # ubuntu-24.04 runner does not ship it, so install before any
      # `just <recipe>` invocation.
      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      # Try to pull the cached dev image from GHCR; fall back to local build.
      - name: Login to GHCR
        if: github.event_name == 'push' || github.repository == github.event.pull_request.head.repo.full_name
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build dev image (with GHA layer cache)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          target: dev
          tags: linerule-dev:local
          load: true
          cache-from: |
            type=gha,scope=docker-dev
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/linerule-dev:cache
          cache-to: type=gha,scope=docker-dev,mode=max

      - name: Cache cargo registry / git / target volumes
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: |
            ~/.cargo-volume
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Lint
        run: just lint
      - name: Build
        run: just build
      - name: Test
        run: just test
      - name: Doc tests
        run: just test-doc
      - name: Coverage
        run: just coverage
      - name: cargo-deny
        run: just deny
      - name: cargo-audit
        run: just audit

  windows-smoke:
    name: native windows smoke
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@315e265cd78dad1e1dcf3a5074f6d6c47029d5aa # stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@27b8ea9368cf428f0bfe41b0876b1a7e809d9844 # v2.7.1
        with:
          key: windows-2022

      # Install the dev tools we need for tests as precompiled binaries.
      - name: Install nextest + llvm-cov
        uses: taiki-e/install-action@ec28e287910af896fd98e04056d31fa68607e7ad # v2.77.4
        with:
          tool: cargo-nextest,cargo-llvm-cov

      - name: Build
        run: cargo build --release --workspace

      - name: Smoke test (linerule-platform)
        run: cargo nextest run --package linerule-platform --release

  cross-build-windows-from-linux:
    name: cross-compile (linux → windows-msvc)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build dev image (with GHA layer cache)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          target: dev
          tags: linerule-dev:local
          load: true
          cache-from: type=gha,scope=docker-dev
          cache-to: type=gha,scope=docker-dev,mode=max

      - name: Cross-build
        run: just build-windows
