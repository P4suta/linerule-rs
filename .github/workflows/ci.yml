name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Successive pushes cancel earlier in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read   # pull dev image from ghcr.io

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  lint-test-coverage:
    name: lint + test + coverage (linux, docker)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # `just` is the single entry point for every recipe (ADR-0005). The
      # ubuntu-24.04 runner does not ship it, so install before any
      # `just <recipe>` invocation.
      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      # Try to pull the cached dev image from GHCR; fall back to local build.
      - name: Login to GHCR
        if: github.event_name == 'push' || github.repository == github.event.pull_request.head.repo.full_name
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build dev image (with GHA layer cache)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          target: dev
          tags: linerule-dev:local
          load: true
          cache-from: |
            type=gha,scope=docker-dev
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/linerule-dev:cache
          cache-to: type=gha,scope=docker-dev,mode=max

      - name: Cache cargo registry / git / target volumes
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo-volume
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Lint
        run: just lint
      - name: Build
        run: just build
      - name: Test
        run: just test
      - name: Doc tests
        run: just test-doc
      - name: Coverage
        run: just coverage
      - name: cargo-deny
        run: just deny
      - name: cargo-audit
        run: just audit

  windows-smoke:
    name: native windows smoke
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@919333daf4640a6fca9dd8b87468dc776e46b44b # v2.7.1
        with:
          key: windows-2022

      # Install the dev tools we need for tests as precompiled binaries.
      - name: Install nextest + llvm-cov
        uses: taiki-e/install-action@7be9fd86bd1707236395105d6e9329dd1511a7e1 # v2.79.0
        with:
          tool: cargo-nextest,cargo-llvm-cov

      - name: Build
        run: cargo build --release --workspace

      - name: Smoke test (linerule-platform)
        run: cargo nextest run --package linerule-platform --release

  cross-build-windows-from-linux:
    name: cross-compile (linux → windows-msvc)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build dev image (with GHA layer cache)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          target: dev
          tags: linerule-dev:local
          load: true
          cache-from: type=gha,scope=docker-dev
          cache-to: type=gha,scope=docker-dev,mode=max

      - name: Cross-build
        run: just build-windows
