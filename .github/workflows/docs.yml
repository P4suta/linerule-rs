# Build `cargo doc` for all crates and deploy to GitHub Pages on every
# successful push to `main`. The published rustdoc is the canonical API
# reference; `lib.rs` crate-doc and `///` items feed it directly.

name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build (cargo doc)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # .cargo/config.toml forces -fuse-ld=mold for x86_64-unknown-linux-gnu;
      # install mold so the link step actually finds the linker.
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo doc
        env:
          # Stable rustdoc only. `--enable-index-page` / `-Z unstable-options`
          # need nightly; we write a manual redirect HTML in the next step
          # so the gh-pages root lands on linerule_core's index.
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --exclude linerule-platform-windows
      - name: write redirect index.html (stable rustdoc has no auto-index)
        run: |
          cat > target/doc/index.html <<'HTML'
          <!doctype html><meta http-equiv="refresh" content="0; url=linerule_core/index.html">
          HTML
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: target/doc

  deploy:
    name: deploy (gh-pages)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
