# Builds the linerule-rs dev container image and pushes it to ghcr.io.
#
# Why a pre-built image (vs `docker compose build` on every clone):
#   - Actions runners ship with GITHUB_TOKEN pre-configured, so
#     cargo-binstall hits the authenticated api.github.com rate limit (5000/h)
#     instead of the anonymous 60/h cliff. Step 10 stays in the ~70 s lane
#     instead of ~10 min of retries-and-source-compile.
#   - `cache-from: type=gha` keeps cargo registry / binstall layers warm.
#   - End users `docker compose pull` (≈20 s for 1.2 GB) instead of building.
#
# Trigger policy:
#   - push to main with Dockerfile / workflow file changes
#   - weekly schedule to refresh prebuilt tool versions
#   - manual workflow_dispatch for ad-hoc rebuilds

name: dev-image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - compose.yml
      - .github/workflows/dev-image.yml
  schedule:
    # Sunday 03:00 UTC — refresh prebuilt tool versions weekly.
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: dev-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: build + push to ghcr.io
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: docker meta (tags + labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/linerule-rs-dev
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
      - name: build + push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |-
            github-token=${{ secrets.GITHUB_TOKEN }}
