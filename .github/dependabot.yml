version: 2

# Dependabot is the only allowed scheduled job. Bumps Cargo crates weekly
# and pins GitHub Actions to fresh SHAs.
#
# Every entry pins commit-message.prefix to "build(deps)" so the
# `conventional commits` CI gate accepts Dependabot-authored commits.

updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build(deps)"
    groups:
      tracing:
        patterns:
          - "tracing*"
      serde:
        patterns:
          - "serde*"
      test:
        patterns:
          - "proptest"
          - "tempfile"
      windows:
        patterns:
          - "windows"
          - "windows-core"
          - "windows-*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(deps)"

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(deps)"
    groups:
      commitlint:
        patterns:
          - "@commitlint/*"

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(deps)"
